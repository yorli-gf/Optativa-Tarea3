name: Docker to Azure App Service Deployment

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./iac
        run: |
          terraform init
          terraform import azurerm_resource_group.main /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-iac-demo || true
          terraform apply -auto-approve

      - name: Log in to ACR
        run: |
          # Esto usa la sesión ya abierta para entrar al registro
          az acr login --name ${{ secrets.AZURE_REGISTRY_USERNAME }}

      - name: Build and push container image
        run: |
          docker build app/ -t ${{ secrets.AZURE_REGISTRY_SERVER }}/${{ secrets.AZURE_WEBAPP_NAME }}:${{ github.sha }}
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/${{ env.AZURE_WEBAPP_NAME }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.AZURE_REGISTRY_SERVER }}/${{ secrets.AZURE_WEBAPP_NAME }}:${{ github.sha }}